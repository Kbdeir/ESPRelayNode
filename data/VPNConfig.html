<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VPN Configuration</title>
<style>
:root{--page:#edf1f5;--ink:#152033;--panel:#fff;--panel-2:#f8fafc;--line:#d9e1ea;--field:#fdfefe;--teal:#0f766e;--teal-dark:#0a5f59;--blue:#2563eb;--shadow-sm:0 2px 8px rgba(21,32,51,.06);--shadow:0 18px 45px rgba(21,32,51,.12)}
*{box-sizing:border-box}
html{background:var(--page)}
body{margin:0;min-height:100vh;color:var(--ink);font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.42;background:linear-gradient(180deg,#dfe9f3 0,#edf1f5 320px),var(--page)}
.shell{width:min(960px,calc(100vw - 32px));margin:0 auto;padding:24px 0 36px}
.topbar{color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:linear-gradient(135deg,#152033,#103f49,#0f766e);box-shadow:var(--shadow)}
.topbar h1{margin:0;font-size:26px;font-weight:700}
.topbar .hint{margin-top:7px;color:#cfe0ea}
.card{margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow-sm);padding:20px}
.card h2{position:relative;display:flex;align-items:center;gap:10px;margin:-2px 0 16px;padding-bottom:12px;border-bottom:1px solid var(--line);font-size:18px}
.card h2::before{content:"";width:10px;height:28px;border-radius:6px;background:var(--teal);flex:0 0 auto}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 16px}
.field{min-width:0}
.field.full{grid-column:1/-1}
label{display:block;margin-bottom:6px;color:#0f172a;font-weight:700}
input[type="text"],input[type="number"],select,textarea{display:block;inline-size:-webkit-fill-available;inline-size:-moz-available;min-height:38px;border:1px solid #b8c6d8;border-radius:6px;background:var(--field);color:#0f172a;font:inherit;padding:8px 10px}
textarea{min-height:98px;resize:vertical;font-family:Consolas,"Courier New",monospace;font-size:13px}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.16);outline:0}
.check-row{min-height:38px;display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;font-weight:700}
.check-row input{width:18px;height:18px;margin:0}
.status-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.status-head h2{margin-bottom:0;flex:1 1 auto}
.status-pill{display:inline-flex;align-items:center;min-height:30px;border:1px solid #cbd5e1;border-radius:6px;background:#f1f5f9;color:#334155;font-weight:700;padding:5px 10px;white-space:nowrap}
.status-pill.connected{border-color:var(--teal);background:#e6f5f2;color:#0f5f58}
.status-pill.connecting{border-color:#c08400;background:#fff7db;color:#7c5200}
.status-pill.disabled{border-color:#cbd5e1;background:#f8fafc;color:#64748b}
.status-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 16px}
.status-item{min-width:0;padding:10px 12px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px}
.status-label{display:block;color:#64748b;font-size:12px;font-weight:700;text-transform:uppercase}
.status-value{display:block;min-height:20px;margin-top:4px;color:#0f172a;font-family:Consolas,"Courier New",monospace;overflow-wrap:anywhere}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
input[type="submit"],.button-link{min-height:40px;border:1px solid var(--teal-dark);border-radius:6px;background:var(--teal);color:#fff;font:inherit;font-weight:700;padding:10px 16px;text-align:center;text-decoration:none;cursor:pointer}
.button-link.secondary{border-color:#b8c6d8;background:#fff;color:#334155}
@media(max-width:720px){.topbar,.status-head{align-items:flex-start;flex-direction:column}.status-grid,.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}}
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div>
      <h1>VPN Configuration</h1>
      <div class="hint">WireGuard tunnel parameters stored on this device.</div>
          <div>Heap: <strong id="hb-free">—</strong> B | min: <strong id="hb-min">—</strong> B | blk: <strong id="hb-blk">—</strong> B</div>
</div>
    <a class="button-link secondary" href="/">Back To Config</a>
  </header>

  <section class="card">
    <div class="status-head">
      <h2>WireGuard Status</h2>
      <span class="status-pill disabled" id="WGStatusState">Loading</span>
    </div>
    <div class="status-grid">
      <div class="status-item"><span class="status-label">Address</span><span class="status-value" id="WGStatusAddress">-</span></div>
      <div class="status-item"><span class="status-label">Endpoint</span><span class="status-value" id="WGStatusEndpoint">-</span></div>
      <div class="status-item"><span class="status-label">Resolved Endpoint</span><span class="status-value" id="WGStatusResolvedEndpoint">-</span></div>
      <div class="status-item"><span class="status-label">Peer IP</span><span class="status-value" id="WGStatusPeerIp">-</span></div>
      <div class="status-item"><span class="status-label">DNS</span><span class="status-value" id="WGStatusDns">-</span></div>
      <div class="status-item" id="WGLivenessRow" style="display:none"><span class="status-label">DNS Liveness</span><span class="status-value" id="WGStatusLiveness">-</span></div>
    </div>
  </section>

  <section class="card">
    <h2>VPN Configuration</h2>
    <form id="VPNConfig">
      <div class="form-grid">
        <div class="field full"><label class="check-row" for="VPNEnabled"><input type="checkbox" id="VPNEnabled" name="VPNEnabled"><span>Enable VPN tunnel</span></label></div>
        <div class="field full"><label for="VPNProtocol">VPN Protocol</label><select name="VPNProtocol" id="VPNProtocol"><option value="WireGuard">WireGuard</option></select></div>
        <div class="field full"><label for="WGPrivateKey">Private Key (base64)</label><textarea id="WGPrivateKey" name="WGPrivateKey" placeholder="Paste your WireGuard private key here"></textarea></div>
        <div class="field"><label for="WGLocalIP">Local Tunnel IP</label><input type="text" id="WGLocalIP" name="WGLocalIP" value="" placeholder="10.0.0.2"></div>
        <div class="field full"><label for="WGPeerPublicKey">Peer Public Key (base64)</label><textarea id="WGPeerPublicKey" name="WGPeerPublicKey" placeholder="Paste your peer's public key here"></textarea></div>
        <div class="field"><label for="WGPeerEndpoint">Peer Endpoint</label><input type="text" id="WGPeerEndpoint" name="WGPeerEndpoint" value="" placeholder="vpn.example.com:51820"></div>
        <div class="field"><label for="WGAllowedIPs">Allowed IPs</label><input type="text" id="WGAllowedIPs" name="WGAllowedIPs" value="" placeholder="10.0.0.0/24, 192.168.1.0/24"></div>
        <div class="field"><label for="WGDnsServers">DNS Servers (optional, comma-separated)</label><input type="text" id="WGDnsServers" name="WGDnsServers" value="" placeholder="10.0.0.1, 8.8.8.8"></div>
        <div class="field"><label>DNS Liveness</label><label class="check-row" for="WGDnsLivenessCheck"><input type="checkbox" id="WGDnsLivenessCheck" name="WGDnsLivenessCheck"><span>Enable DNS liveness check</span></label></div>
        <div class="field"><label for="WGDnsLivenessInterval">DNS liveness interval (seconds)</label><input type="number" id="WGDnsLivenessInterval" name="WGDnsLivenessInterval" value="30" min="5"></div>
      </div>
      <div class="actions">
        <button type="button" class="button-link" id="saveBtn">Save VPN Configuration</button>
        <label class="button-link secondary" for="importConfFile" style="cursor:pointer">Import .conf</label>
        <input type="file" id="importConfFile" style="position:absolute;width:0.1px;height:0.1px;opacity:0;overflow:hidden;z-index:-1">
        <button type="button" class="button-link secondary" id="exportConfBtn">Export .conf</button>
        <a class="button-link secondary" href="/">Cancel</a>
      </div>
      <div id="vpn-save-status" style="margin-top:10px;font-size:13px;min-height:18px;color:#0f766e;"></div>
    </form>
  </section>
</main>
<script>
(function(){
  function st(id,v){var e=document.getElementById(id);if(e)e.textContent=v||"-";}
  function setState(d){
    var s=document.getElementById("WGStatusState");if(!s)return;
    s.className="status-pill";
    if(d.connected){
      var f=d.dnsLivenessFailures||0;
      if(d.dnsLivenessCheck&&f>0){s.textContent="Degraded (&#9888; "+f+" DNS fail)";s.className+=" connecting";}
      else{s.textContent="Connected";s.className+=" connected";}
    }else if(d.networkUp){
      s.textContent=(d.dnsLivenessFailures||0)>0?"Peer Unreachable":"Re-handshaking";s.className+=" connecting";
    }else if(d.started){s.textContent="Establishing";s.className+=" connecting";}
    else if(d.reconnecting){s.textContent="Reconnect Pending";s.className+=" connecting";}
    else if(d.enabled){s.textContent="Enabled";s.className+=" connecting";}
    else{s.textContent="Disabled";s.className+=" disabled";}
  }
  function refresh(){
    var req=new XMLHttpRequest();req.open("GET","/WireGuardStatus.json",true);
    req.onreadystatechange=function(){
      if(req.readyState!==4)return;
      if(req.status!==200){var s=document.getElementById("WGStatusState");if(s){s.textContent="Unavailable";s.className="status-pill disabled";}return;}
      var d={};try{d=JSON.parse(req.responseText);}catch(e){return;}
      setState(d);
      st("WGStatusAddress",d.address);st("WGStatusEndpoint",d.endpoint);
      st("WGStatusResolvedEndpoint",d.resolvedEndpoint);st("WGStatusPeerIp",d.peerIp);st("WGStatusDns",d.dns);
      var lr=document.getElementById("WGLivenessRow"),lv=document.getElementById("WGStatusLiveness");
      if(d.dnsLivenessCheck){
        if(lr)lr.style.display="";
        var f=d.dnsLivenessFailures||0,iv=d.dnsLivenessInterval||0;
        if(lv)lv.textContent=f===0?"OK (every "+iv+"s)":f+" consecutive failure"+(f!==1?"s":"")+" (every "+iv+"s)";
      }else{if(lr)lr.style.display="none";}
    };req.send();
  }
  refresh();setInterval(refresh,5000);
})();
</script>
<script>
(function(){function ph(){fetch('/api/heap').then(function(r){return r.json();}).then(function(d){var f=document.getElementById('hb-free'),m=document.getElementById('hb-min'),b=document.getElementById('hb-blk');if(f&&d.heap!=null)f.textContent=Number(d.heap).toLocaleString();if(m&&d.heapMin!=null)m.textContent=Number(d.heapMin).toLocaleString();if(b&&d.heapMaxBlk!=null)b.textContent=Number(d.heapMaxBlk).toLocaleString();}).catch(function(){});}ph();setInterval(ph,30000);}());
</script>
<script>
(function(){
  document.getElementById('exportConfBtn').addEventListener('click', function(){
    function g(id){var el=document.getElementById(id);return el?el.value.trim():'';}
    var lines=['[Interface]'];
    var pk=g('WGPrivateKey');if(pk)lines.push('PrivateKey = '+pk);
    var addr=g('WGLocalIP');if(addr)lines.push('Address = '+addr);
    var dns=g('WGDnsServers');if(dns)lines.push('DNS = '+dns);
    lines.push('','[Peer]');
    var ppk=g('WGPeerPublicKey');if(ppk)lines.push('PublicKey = '+ppk);
    var ep=g('WGPeerEndpoint');if(ep)lines.push('Endpoint = '+ep);
    var aip=g('WGAllowedIPs');if(aip)lines.push('AllowedIPs = '+aip);
    var blob=new Blob([lines.join('\n')],{type:'text/plain'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wg0.conf';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
  });
  document.getElementById('importConfFile').addEventListener('change',function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var text=ev.target.result,section='',kv={};
      text.split(/\r?\n/).forEach(function(raw){
        var line=raw.trim();
        if(!line||line[0]==='#'||line[0]===';')return;
        var sm=line.match(/^\[(.+)\]$/);
        if(sm){section=sm[1].toLowerCase();return;}
        var eq=line.indexOf('=');if(eq<0)return;
        var k=line.slice(0,eq).trim().toLowerCase(),v=line.slice(eq+1).trim();
        kv[section+'.'+k]=v;
      });
      function set(id,val){var el=document.getElementById(id);if(el&&val!=null)el.value=val;}
      set('WGPrivateKey',kv['interface.privatekey']);
      set('WGLocalIP',kv['interface.address']);
      set('WGDnsServers',kv['interface.dns']);
      set('WGPeerPublicKey',kv['peer.publickey']);
      set('WGPeerEndpoint',kv['peer.endpoint']);
      set('WGAllowedIPs',kv['peer.allowedips']);
      e.target.value='';
    };
    reader.readAsText(file);
  });
})();
</script>
<script>
(function(){
  function g(id){var el=document.getElementById(id);return el?el.value.trim():'';}
  function showStatus(msg,ok){
    var el=document.getElementById('vpn-save-status');if(!el)return;
    el.textContent=msg;el.style.color=ok===false?'#dc2626':'#0f766e';
    if(ok!==null)setTimeout(function(){el.textContent='';},3000);
  }
  function loadConfig(){
    fetch('/api/vpnconfig',{credentials:'same-origin'})
      .then(function(r){return r.json();})
      .then(function(d){
        var cb=document.getElementById('VPNEnabled');if(cb)cb.checked=(d.VPNEnabled==='1');
        var dcb=document.getElementById('WGDnsLivenessCheck');if(dcb)dcb.checked=(d.WGDnsLivenessCheck==='1');
        function sv(id,v){var el=document.getElementById(id);if(el)el.value=v||'';}
        sv('WGPrivateKey',d.WGPrivateKey);sv('WGLocalIP',d.WGLocalIP);
        sv('WGPeerPublicKey',d.WGPeerPublicKey);sv('WGPeerEndpoint',d.WGPeerEndpoint);
        sv('WGAllowedIPs',d.WGAllowedIPs);sv('WGDnsServers',d.WGDnsServers);
        sv('WGDnsLivenessInterval',d.WGDnsLivenessInterval||30);
      })
      .catch(function(){showStatus('Failed to load configuration.',false);});
  }
  document.getElementById('saveBtn').addEventListener('click',function(){
    var btn=this;btn.disabled=true;
    var payload={
      VPNEnabled:document.getElementById('VPNEnabled').checked?'1':'0',
      VPNProtocol:'WireGuard',
      WGPrivateKey:g('WGPrivateKey'),WGLocalIP:g('WGLocalIP'),
      WGPeerPublicKey:g('WGPeerPublicKey'),WGPeerEndpoint:g('WGPeerEndpoint'),
      WGAllowedIPs:g('WGAllowedIPs'),WGDnsServers:g('WGDnsServers'),
      WGDnsLivenessCheck:document.getElementById('WGDnsLivenessCheck').checked?'1':'0',
      WGDnsLivenessInterval:parseInt(document.getElementById('WGDnsLivenessInterval').value)||30
    };
    fetch('/api/vpnconfig',{method:'POST',credentials:'same-origin',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(function(r){return r.json();})
      .then(function(d){showStatus(d.ok?'Saved.':'Save failed.',d.ok?true:false);})
      .catch(function(){showStatus('Error saving.',false);})
      .then(function(){btn.disabled=false;});
  });
  loadConfig();
})();
</script>
</body>
</html>
