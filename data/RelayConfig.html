<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Relay Configuration</title>
<style>
:root{--page:#edf1f5;--ink:#152033;--muted:#687589;--panel:#fff;--panel-2:#f8fafc;--line:#d9e1ea;--field:#fdfefe;--teal:#0f766e;--teal-dark:#0a5f59;--blue:#2563eb;--amber:#b7791f;--rose:#be123c;--green:#15803d;--slate:#475569;--shadow-sm:0 2px 8px rgba(21,32,51,.06);--shadow:0 18px 45px rgba(21,32,51,.12)}
*{box-sizing:border-box}
html{background:var(--page)}
body{margin:0;min-height:100vh;color:var(--ink);font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.42;background:linear-gradient(180deg,#dfe9f3 0,#edf1f5 320px),var(--page)}
.shell{width:min(860px,calc(100vw - 32px));margin:0 auto;padding:24px 0 36px}
.topbar{position:relative;overflow:hidden;color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:24px 26px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:20px;align-items:center;background:linear-gradient(135deg,#152033,#103f49,#0f766e);box-shadow:var(--shadow)}
.topbar h1{margin:0;font-size:28px;font-weight:700}
.topbar .hint{margin-top:7px;color:#cfe0ea}
.topbar .meta{min-width:200px;color:#e6eef5;font-size:13px;text-align:right;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:10px 12px}
.back-link{color:#a8d8cf;font-size:13px;text-decoration:none;white-space:nowrap;margin-top:6px;display:inline-block}
.back-link:hover{color:#fff}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow-sm);padding:18px;margin-top:16px}
.card h2{position:relative;display:flex;align-items:center;gap:10px;margin:-2px 0 16px;padding-bottom:12px;color:var(--ink);border-bottom:1px solid var(--line);font-size:18px;font-weight:700}
.card h2::before{content:"";width:10px;height:28px;border-radius:6px;background:var(--teal);flex:0 0 auto}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{color:var(--muted);font-size:12px;font-weight:700}
input[type="text"],input[type="number"],select{min-height:38px;border:1px solid #bac7d5;border-radius:8px;background:var(--field);color:var(--ink);padding:8px 10px;font:inherit;transition:border-color 120ms ease,box-shadow 120ms ease,background-color 120ms ease}
input:focus,select:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.16)}
input[type="checkbox"]{width:18px;height:18px;accent-color:var(--teal)}
.check-row{min-height:38px;display:flex;align-items:center;gap:9px;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
.relay-actions{display:grid;grid-template-columns:1fr 64px 64px;gap:8px;align-items:end}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
button,input[type="submit"],input[type="button"]{min-height:38px;border:1px solid transparent;border-radius:8px;background:var(--teal);color:#fff;padding:8px 15px;font:inherit;font-weight:700;cursor:pointer;text-align:center;box-shadow:0 5px 14px rgba(15,118,110,.22);transition:transform 120ms ease,box-shadow 120ms ease,background-color 120ms ease}
button:hover,input[type="submit"]:hover,input[type="button"]:hover{background:var(--teal-dark);box-shadow:0 7px 18px rgba(15,118,110,.28);transform:translateY(-1px)}
.secondary{background:var(--slate)!important;box-shadow:0 5px 14px rgba(71,85,105,.18)!important}
.ok{background:var(--green)!important}
.danger{background:var(--rose)!important}
.hidden-field{display:none}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}.topbar{grid-template-columns:1fr}.topbar .meta{min-width:0;text-align:left}.relay-actions{grid-template-columns:1fr 90px}}
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div>
      <h1>Relay Configuration</h1>
      <div class="hint">Configure MQTT topics, timers, and current sensing for each relay.</div>
    </div>
    <div class="meta">
      <div>Chip ID: <span id="topbar-chipid">—</span></div>
      <div>System time: <span id="topbar-time">-</span></div>
      <div>Relay 0: <span id="RSTATE0">-</span> &nbsp; Relay 1: <span id="RSTATE1">-</span></div>
      <div>Heap: <strong id="hb-free">—</strong> B | min: <strong id="hb-min">—</strong> B | blk: <strong id="hb-blk">—</strong> B</div>
      <a class="back-link" href="/">&#8592; Back to Config</a>
    </div>
  </header>

  <section class="card">
    <h2>Relay Control</h2>
    <form name="RelaySelector" method="get" action="/RelayConfig.html" id="Form5">
      <div class="relay-actions">
        <select name="GETRELAYNB" id="GETRELAYNB">%RELAYNB_OPTIONS%</select>
        <input type="submit" class="ok" name="RELAYACTION" value="ON">
        <input type="submit" class="danger" name="RELAYACTION" value="OFF">
      </div>
    </form>
  </section>

  <form name="RelayConf" method="get" action="/ApplyRelay.html" enctype="text/plain" id="RelayConf">
    <section class="card">
      <h2>Relay <span id="relay-heading-nb">0</span></h2>
      <input class="hidden-field" type="text" id="RelayNB" name="RELAYNB">
      <div class="form-grid">
        <div class="field">
          <label for="RelayConfigSelect">Displayed Relay</label>
          <select id="RelayConfigSelect" onchange="reloadRelayConfig(this)">%RELAY_CONFIG_OPTIONS%</select>
        </div>
        <div class="field full"><label for="PUB_TOPIC1">Coil Value Publish Topic</label><input type="text" id="PUB_TOPIC1" name="PUB_TOPIC1" maxlength="64"></div>
        <div class="field full"><label for="STATE_PUB_TOPIC">Coil State Publish Topic</label><input type="text" id="STATE_PUB_TOPIC" name="STATE_PUB_TOPIC" maxlength="64"></div>
        <div class="field full"><label for="ttl_PUB_TOPIC">TTL Publish Topic</label><input type="text" id="ttl_PUB_TOPIC" name="ttl_PUB_TOPIC" maxlength="64"></div>
        <div class="field full"><label for="CURR_TTL_PUB_TOPIC">Current TTL Publish Topic</label><input type="text" id="CURR_TTL_PUB_TOPIC" name="CURR_TTL_PUB_TOPIC" maxlength="64"></div>
        <div class="field full"><label for="i_ttl_PUB_TOPIC">Stored TTL Update Topic</label><input type="text" id="i_ttl_PUB_TOPIC" name="i_ttl_PUB_TOPIC" maxlength="64"></div>
        <div class="field full"><label for="ACS_AMPS">Amps Sensor Publish Topic</label><input type="text" id="ACS_AMPS" name="ACS_AMPS" maxlength="64"></div>
        <div class="field full"><label for="LWILL_TOPIC">MQTT Last Will Topic</label><input type="text" id="LWILL_TOPIC" name="LWILL_TOPIC" maxlength="64"></div>
        <div class="field full"><label for="SUB_TOPIC1">MQTT Subscription Topic</label><input type="text" id="SUB_TOPIC1" name="SUB_TOPIC1" maxlength="64"></div>
        <div class="field full">
          <label for="TemperatureValue_edt">Temperature Value Topic</label>
          <input type="text" id="TemperatureValue_edt" name="TemperatureValue" maxlength="64">
          <input type="hidden" id="HasTempRelayEnabled">
          <input type="hidden" id="HasOtherTempRelayEnabled">
        </div>
        <div class="field"><label for="AlexaName">Alexa Name</label><input type="text" id="AlexaName" name="AlexaName" maxlength="32"></div>
        <div class="field"><label for="ttl">Time To Live</label><input type="number" id="ttl" name="ttl"></div>
        <div class="field"><label for="tta">Time To Activate</label><input type="number" id="tta" name="tta"></div>
        <div class="field"><label for="ACS_elasticity">Time Elasticity</label><input type="number" id="ACS_elasticity" name="ACS_elasticity"></div>
        <div class="field"><label for="Max_Current">Max Current</label><input type="number" id="Max_Current" name="Max_Current" maxlength="2"></div>
        <div class="field">
          <label for="ACSmultiple">ACS Sensor Model</label>
          <select name="ACSmultiple" id="ACSmultiple" onchange="myFunction(this)">
            <option value="5">5 Amps</option>
            <option value="20">20 Amps</option>
            <option value="30">30 Amps</option>
          </select>
          <input class="hidden-field" type="text" id="ACS_Sensor_Model" name="ACS_Sensor_Model" readonly>
        </div>
        <div class="field">
          <label>Measure Current</label>
          <div class="check-row"><input type="checkbox" id="ACS_Active" name="ACS_Active" value="1"> <span>Enable ACS</span></div>
        </div>
      </div>
      <div class="actions">
        <input type="submit" id="Button1Relay" name="Submit" value="Save Relay" form="RelayConf">
        <input type="button" class="secondary" onclick="window.location.href='/'" value="Back to Config">
      </div>
    </section>
  </form>
</main>
<script>
function setValue(id,v){var e=document.getElementById(id);if(e)e.value=v;}
function myFunction(sel){setValue("ACS_Sensor_Model",sel.value);}
function reloadRelayConfig(sel){fetchAndApplyConfig(sel.value);}

function fetchAndApplyConfig(relayNb){
  var url="/GetConfig.json";
  if(relayNb!=null)url+="?relay="+encodeURIComponent(relayNb);
  var req=new XMLHttpRequest();req.open("GET",url,true);
  req.onreadystatechange=function(){
    if(req.readyState!==4||req.status!==200)return;
    var d;try{d=JSON.parse(req.responseText);}catch(e){return;}
    applyRelayData(d);
  };req.send();
}

function applyRelayData(d){
  function sv(id,v){var e=document.getElementById(id);if(e)e.value=(v!=null)?v:"";}
  function st(id,v){var e=document.getElementById(id);if(e)e.textContent=(v!=null&&v!=="")?String(v):"-";}
  function sc(id,v){var e=document.getElementById(id);if(e)e.checked=(v===1||v==="1"||v===true);}
  st("topbar-chipid",d.NODEID);st("topbar-time",d.systemtime);st("RSTATE0",d.RSTATE0);st("RSTATE1",d.RSTATE1);
  st("relay-heading-nb",d.RELAYNB!=null?d.RELAYNB:"");
  var btn=document.getElementById("Button1Relay");
  if(btn)btn.value="Save Relay "+(d.RELAYNB!=null?d.RELAYNB:"");
  sv("RelayNB",d.RELAYNB);sv("PUB_TOPIC1",d.PUB_TOPIC1);sv("STATE_PUB_TOPIC",d.STATE_PUB_TOPIC);
  sv("ttl_PUB_TOPIC",d.TTL_PUB_TOPIC);sv("CURR_TTL_PUB_TOPIC",d.CURR_TTL_PUB_TOPIC);
  sv("i_ttl_PUB_TOPIC",d.i_ttl_PUB_TOPIC);sv("ACS_AMPS",d.ACS_AMPS);sv("LWILL_TOPIC",d.LWILL_TOPIC);
  sv("SUB_TOPIC1",d.SUB_TOPIC1);sv("TemperatureValue_edt",d.TemperatureValue);sv("AlexaName",d.AlexaName);
  sv("ttl",d.ttl);sv("tta",d.tta);sv("ACS_elasticity",d.ACS_elasticity);sv("Max_Current",d.Max_Current);
  sv("ACS_Sensor_Model",d.ACS_Sensor_Model);setValue("ACSmultiple",d.ACS_Sensor_Model);
  sc("ACS_Active",d.ACS_Active);
  sv("HasTempRelayEnabled",d.HasTempRelay);sv("HasOtherTempRelayEnabled",d.HasOtherTempRelay);
  setValue("RelayConfigSelect",d.RELAYNB);
}

document.addEventListener("DOMContentLoaded",function(){
  fetchAndApplyConfig();
  setInterval(function(){
    var req=new XMLHttpRequest();req.open("GET","/SensorStatus.json",true);
    req.onreadystatechange=function(){
      if(req.readyState!==4||req.status!==200)return;
      var d;try{d=JSON.parse(req.responseText);}catch(e){return;}
      var s0=document.getElementById("RSTATE0");if(s0)s0.textContent=d.RSTATE0||"-";
      var s1=document.getElementById("RSTATE1");if(s1)s1.textContent=d.RSTATE1||"-";
    };req.send();
  },3000);
});
</script>
<script>
(function(){function ph(){fetch('/api/heap').then(function(r){return r.json();}).then(function(d){var f=document.getElementById('hb-free'),m=document.getElementById('hb-min'),b=document.getElementById('hb-blk');if(f&&d.heap!=null)f.textContent=Number(d.heap).toLocaleString();if(m&&d.heapMin!=null)m.textContent=Number(d.heapMin).toLocaleString();if(b&&d.heapMaxBlk!=null)b.textContent=Number(d.heapMaxBlk).toLocaleString();}).catch(function(){});}ph();setInterval(ph,30000);}());
</script>
</body>
</html>
